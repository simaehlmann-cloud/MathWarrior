name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install & Configure Project
      run: |
        # Erstelle package.json
        echo '{"name": "mathwarrior", "version": "1.0.0", "dependencies": {}}' > package.json
        # Installiere alles lokal
        npm install @capacitor/core @capacitor/cli @capacitor/android
        # Capacitor initialisieren
        npx cap init MathWarrior com.simon.mathwarrior --web-dir .
        npx cap add android

    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MathWarrior-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
