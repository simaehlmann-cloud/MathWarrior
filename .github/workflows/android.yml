name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Prepare Folder Structure
      run: |
        # Wir erstellen einen Unterordner 'www' für die Web-Dateien
        mkdir www
        # Kopiere index.html, manifest.json und das Icon in den neuen Ordner
        cp index.html manifest.json image.png www/
        # Erstelle eine einfache Konfigurationsdatei
        echo '{"name": "mathwarrior", "version": "1.0.0", "dependencies": {}}' > package.json

    - name: Install & Configure Capacitor
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android
        # Jetzt zeigen wir auf den neuen Ordner 'www'
        npx cap init MathWarrior com.simon.mathwarrior --web-dir www
        npx cap add android

    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MathWarrior-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
