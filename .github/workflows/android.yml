name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Prepare Folder Structure
      run: |
        # Erstelle www Ordner und verschiebe alle Web-Dateien dorthin
        mkdir -p www
        cp index.html manifest.json image.png www/ 2>/dev/null || :
        
        # Erstelle package.json für Capacitor
        echo '{"name": "mathwarrior", "version": "1.0.0", "dependencies": {}}' > package.json

    - name: Install & Configure Capacitor
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init MathWarrior com.simon.mathwarrior --web-dir www
        npx cap add android

    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew clean assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MathWarrior-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
