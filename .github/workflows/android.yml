name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Prepare Folder Structure
      run: |
        # Erstelle www Ordner und verschiebe alle Web-Dateien dorthin
        mkdir -p www
        cp index.html manifest.json image.png www/ 2>/dev/null || :
        
        # Erstelle package.json für Capacitor
        echo '{"name": "mathwarrior", "version": "1.0.0", "dependencies": {}}' > package.json

    - name: Install & Configure Capacitor
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init MathWarrior com.simon.mathwarrior --web-dir www
        npx cap add android

    - name: Generate App Icons & Splash Screen
      run: |
        # Quellbilder für das offizielle Capacitor-Assets-Tool vorbereiten.
        # Ausgangsbild ist image.png (mind. 1024x1024 nötig).
        mkdir -p assets

        # Klassisches Icon (ältere Android-Versionen): volle Fläche
        convert image.png -resize 1024x1024^ -gravity center -extent 1024x1024 assets/icon-only.png

        # Adaptives Icon (Android 8+): Hintergrund + Vordergrund getrennt.
        # Das Logo wird auf ca. 66% verkleinert, damit es in der "sicheren Zone"
        # liegt und beim runden Zuschneiden nicht abgeschnitten wird.
        convert -size 1024x1024 xc:"#111111" PNG24:assets/icon-background.png
        convert -size 1024x1024 xc:none \( image.png -resize 660x660 \) -gravity center -composite assets/icon-foreground.png

        # Splashscreen: Logo mittig auf dunklem Hintergrund (passend zur App)
        convert -size 2732x2732 xc:"#111111" \( image.png -resize 1200x1200 \) -gravity center -composite assets/splash.png
        cp assets/splash.png assets/splash-dark.png

        # Erzeugt alle benötigten mipmap-Größen direkt im Android-Projekt
        npx @capacitor/assets generate --android

    - name: Fix duplicate Kotlin stdlib classes
      run: |
        cat >> android/app/build.gradle << 'EOF'

        configurations.all {
            exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
            exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
        }
        EOF

    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew clean assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MathWarrior-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
