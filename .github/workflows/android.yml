name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Prepare Folder Structure
      run: |
        # Erstelle www Ordner und verschiebe alle Web-Dateien dorthin
        mkdir -p www
        cp index.html manifest.json image.png www/ 2>/dev/null || :
        
        # Erstelle package.json für Capacitor
        echo '{"name": "mathwarrior", "version": "1.0.0", "dependencies": {}}' > package.json

    - name: Install & Configure Capacitor
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init MathWarrior com.simon.mathwarrior --web-dir www
        npx cap add android

    - name: Fix duplicate Kotlin stdlib classes
      run: |
        cat >> android/app/build.gradle << 'EOF'

        configurations.all {
            exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
            exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
        }
        EOF

    - name: Build Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew clean assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: MathWarrior-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

    - name: Configure Signing & Version in build.gradle
      run: |
        cat >> android/app/build.gradle << EOF

        android.signingConfigs {
            release {
                storeFile file("release.keystore")
                storePassword System.getenv("KEYSTORE_PASSWORD")
                keyAlias System.getenv("KEY_ALIAS")
                keyPassword System.getenv("KEY_PASSWORD")
            }
        }
        android.buildTypes.release.signingConfig = android.signingConfigs.release
        android.defaultConfig.versionCode = Integer.parseInt(System.getenv("VERSION_CODE") ?: "1")
        android.defaultConfig.versionName = "1.0." + (System.getenv("VERSION_CODE") ?: "1")
        EOF

    - name: Build Signed Release AAB
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        VERSION_CODE: ${{ github.run_number }}
      run: |
        cd android
        ./gradlew clean bundleRelease

    - name: Upload Release AAB
      uses: actions/upload-artifact@v4
      with:
        name: MathWarrior-AAB-Release
        path: android/app/build/outputs/bundle/release/app-release.aab

    - name: Remove Keystore File
      if: always()
      run: rm -f android/app/release.keystore
