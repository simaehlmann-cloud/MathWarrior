name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install & Configure Capacitor
      run: |
        echo '{"name": "mathwarrior", "version": "1.0.0"}' > package.json
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init MathWarrior com.simon.mathwarrior --web-dir .
        npx cap add android

    - name: Build APK mit Gradle
      working-directory: ./android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MathWarrior-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
